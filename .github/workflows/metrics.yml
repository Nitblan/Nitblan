name: metrics
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nitblan
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          committer_branch: main
          filename: dist/github-metrics-isocalendar.svg
